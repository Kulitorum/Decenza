name: Pre-merge verification

# Compiles every pull request and runs the full ctest suite under
# UndefinedBehaviorSanitizer, before merge. Until this existed, no PR was ever
# compiled by CI: the six platform workflows trigger only on tag pushes, and the
# only pull_request workflow (text-invariants.yml) runs text linters. The first
# compile of a change happened at release time, which is how a build break
# reached a release tag (#1558).
#
# What this job covers — and, just as important, what it does NOT:
#
#   - ONE platform (Linux x64) in ONE configuration (Release + UBSan). Code
#     behind #ifdef Q_OS_IOS / Q_OS_WIN / Q_OS_ANDROID etc. is invisible here;
#     that exact blind spot is how a flag verified on macOS and Android broke
#     the iOS release build. The tag-push workflows remain the full six-platform
#     check, and promoting any diagnostic to -Werror requires six-platform
#     evidence (see docs/CLAUDE_MD/CI_CD.md).
#   - UBSan's reach: signed overflow, invalid shifts, misaligned loads, bad
#     enum/bool values — in code the tests actually execute. It says nothing
#     about untested code, other sanitizers' defect classes, or API misuse that
#     needs annotations the headers don't carry (SecRandomCopyBytes is
#     annotated warn_unused_result; the identical OpenSSL RAND_bytes bug
#     compiled silently).
#
# A green run here means "compiles on Linux, 83 tests pass instrumented" — a
# real gate, not a verification of the codebase.
#
# This job produces no artifacts, never touches versioncode.txt, and never
# interacts with a GitHub Release. Making it a *required* check is a branch
# protection setting, flipped deliberately after observing runtime and flake
# rate on real PRs — not something this file controls.

on:
  pull_request:
  # The push run keeps the main-scoped ccache warm: PR-branch caches are scoped
  # to their own ref, so a fresh PR restores from main's most recent entry.
  # It also verifies the squash-merged result of each PR.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libpulse0 \
            libspeechd2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtquick3d qtshadertools qtgraphs qtconnectivity qtmultimedia qtpositioning qtspeech qtwebsockets qtserialport qtimageformats qtcanvaspainter'
          cache: true
          cache-key-prefix: 'qt-linux-v4'

      # Separate ccache key from linux-release.yml: UBSan objects and release
      # objects never hash-match, so sharing a key would just thrash both caches.
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: pre-merge-ubsan-linux-x86_64

      - name: Configure ccache for CI
        run: ccache --set-config=compiler_check=content

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          $QT_ROOT_DIR/bin/qt-cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_TESTS=ON \
            -DENABLE_UBSAN=ON

      - name: Build
        run: |
          cd build
          ninja -j$(nproc)

      - name: Run tests under UBSan
        env:
          QT_QPA_PLATFORM: offscreen
          # halt_on_error=1 makes a UBSan finding abort the test, so it fails
          # the run. Without it UBSan prints the diagnostic and continues, and
          # a passing exit code hides the report — the exact silent-failure
          # shape this job exists to catch.
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          cd build
          # -j parallelises; --repeat until-pass:3 absorbs the rare timing flake
          # in the two clock-cadence tests (tst_settling, tst_decentscalewifi)
          # under heavy CPU contention. A real failure still fails all 3 attempts.
          set -o pipefail
          ctest --output-on-failure -j$(nproc) --repeat until-pass:3 2>&1 | tee ctest.log

      # A sanitizer diagnostic and a test assertion need different responses
      # (fix undefined behaviour vs fix code/test), so say which one it was
      # in the job summary instead of making someone read the full log.
      - name: Classify failure in job summary
        if: failure()
        run: |
          LOG=build/ctest.log
          [ -f "$LOG" ] || { echo "No ctest log — the failure happened before the test step (build or configure)." >> "$GITHUB_STEP_SUMMARY"; exit 0; }
          {
            echo "## Pre-merge failure triage"
            if grep -q "SUMMARY: UndefinedBehaviorSanitizer" "$LOG"; then
              echo "**UBSan diagnostic(s) found** — undefined behaviour executed by the tests:"
              echo '```'
              grep -E "runtime error:|SUMMARY: UndefinedBehaviorSanitizer" "$LOG" | sort -u | head -40
              echo '```'
            else
              echo "**No sanitizer diagnostic** — this is a test failure (assertion or crash), not undefined behaviour:"
              echo '```'
              grep -E "^[0-9]+% tests passed|Failed +[0-9]+.*sec|\(Failed\)|\(Timeout\)" "$LOG" | head -40
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
