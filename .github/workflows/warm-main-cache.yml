name: Warm main branch cache

# Release promotion (pre-release -> release via `gh release edit --prerelease=false`)
# is not a tag push or workflow_dispatch, so the 6 build workflows never re-run at
# that moment. This dedicated workflow listens for the promotion and dispatches each
# build on `main`, seeding main-scoped Qt + ccache caches so the next real release
# does not build cold. See issue #1213.

on:
  release:
    types: [released]

permissions:
  actions: write

concurrency:
  group: warm-main-cache
  cancel-in-progress: true

jobs:
  warm:
    runs-on: ubuntu-24.04
    steps:
      - name: Dispatch build workflows on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for wf in \
            android-release.yml \
            ios-release.yml \
            linux-release.yml \
            linux-arm64-release.yml \
            macos-release.yml \
            windows-release.yml; do
            gh workflow run "$wf" --repo "$GITHUB_REPOSITORY" --ref main \
              || echo "Cache warm dispatch of $wf failed (non-fatal)"
          done
