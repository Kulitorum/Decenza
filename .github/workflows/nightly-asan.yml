name: Nightly ASan

# Runs the test suite under AddressSanitizer once a night on main.
#
# Why nightly rather than per-PR. The ASan configuration has existed in
# CMakeLists.txt for a long time and no workflow ever invoked it — it was
# auto-enabled for local non-Apple Debug builds only, so the memory defects it
# catches were found only if a developer happened to run a Debug build. This
# workflow is what makes it actually execute.
#
# It is not folded into pre-merge.yml because ASan needs its OWN build: ASan and
# UBSan objects never hash-match, so a second sanitizer means a second full
# compile and a second ccache generation on every pull request. UBSan measured
# at roughly 1.1x the plain suite runtime, so the *test* cost of adding ASan is
# small — it is the duplicated build that does not fit a per-PR budget. UBSan
# gets the per-PR slot because its defect classes (signed overflow, bad shifts,
# misaligned loads, invalid enum/bool) are the plausible ones for a codebase
# doing DER encoding, BLE byte-wrangling and fixed-point scale arithmetic, and
# it is the cheaper of the two.
#
# Expect the first runs to surface pre-existing findings, including leaks at
# exit (LeakSanitizer is on by default on Linux and Qt/QML exit paths are noisy).
# Those are runtime defects to fix or file as separate work — the correct
# response is never to add a suppression to make this job green.
#
# The result is summarised in the job summary and this workflow appears in the
# Actions list, so whether it ran is visible without reading this file.

on:
  schedule:
    # 04:23 UTC — offset from prune-caches.yml's 03:17 cron so the prune has
    # settled before this job writes a new cache generation.
    - cron: '23 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  asan:
    runs-on: ubuntu-24.04
    # ASan roughly doubles runtime on top of a cold build, and nothing is
    # waiting on this job — but an unbounded hang would still burn the 6-hour
    # GitHub default every night before anyone noticed.
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libpulse0 \
            libspeechd2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtquick3d qtshadertools qtgraphs qtconnectivity qtmultimedia qtpositioning qtspeech qtwebsockets qtserialport qtimageformats qtcanvaspainter'
          cache: true
          cache-key-prefix: 'qt-linux-v4'

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: nightly-asan-linux-x86_64

      - name: Configure ccache for CI
        run: ccache --set-config=compiler_check=content

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          $QT_ROOT_DIR/bin/qt-cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_TESTS=ON \
            -DENABLE_ASAN=ON

      - name: Build
        run: |
          cd build
          ninja -j$(nproc)

      - name: Run tests under ASan
        env:
          QT_QPA_PLATFORM: offscreen
          # ASan halts on a memory error by default (unlike UBSan); these just
          # make the report readable and keep leak detection on deliberately.
          ASAN_OPTIONS: print_stacktrace=1:detect_leaks=1
        run: |
          cd build
          set -o pipefail
          ctest --output-on-failure -j$(nproc) --repeat until-pass:3 2>&1 | tee ctest.log

      - name: Summarise result
        if: always()
        run: |
          LOG=build/ctest.log
          {
            echo "## Nightly ASan"
            if [ ! -f "$LOG" ]; then
              echo "Failed before the test step (configure or build)."
            elif grep -q "ERROR: AddressSanitizer\|ERROR: LeakSanitizer" "$LOG"; then
              echo "**ASan finding(s):**"
              echo '```'
              grep -E "ERROR: (Address|Leak)Sanitizer.*" "$LOG" | sort -u | head -40
              echo '```'
            else
              echo "No sanitizer findings."
            fi
            grep -E "^[0-9]+% tests passed" "$LOG" 2>/dev/null || true
          } >> "$GITHUB_STEP_SUMMARY"
