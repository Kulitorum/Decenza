name: Android APK Build

on:
  # Manual trigger from GitHub UI or API
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Upload to GitHub Release'
        required: true
        default: 'false'
        type: boolean

  # Trigger on version tags (pre-release and release)
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history for version tags

      - name: Bump version code
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        id: bump
        run: |
          CURRENT=$(cat versioncode.txt | tr -d '[:space:]')
          NEXT=$((CURRENT + 1))
          echo "$NEXT" > versioncode.txt
          echo "build_code=$NEXT" >> $GITHUB_OUTPUT
          echo "Version code bumped: $CURRENT -> $NEXT"

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'project.*VERSION' CMakeLists.txt | sed 's/.*VERSION \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install minimal host dependencies
        run: sudo apt-get install -y --no-install-recommends libegl1 libgl1 ninja-build

      - name: Install Qt for Android
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtquick3d qtshadertools qtgraphs qtconnectivity qtmultimedia qtpositioning qtspeech qtwebsockets qtimageformats qtcanvaspainter'
          install-deps: false  # Skip apt-get of 61 desktop packages — only libegl1/libgl1 needed for qsb shader compiler
          cache: true
          cache-key-prefix: 'qt-android-v1'

      - name: Install Android NDK
        run: |
          # Try to detect which NDK version Qt expects
          QT_NDK_VERSION=""
          for TOOLCHAIN in "$QT_ROOT_DIR/lib/cmake/Qt6/qt.toolchain.cmake" \
                           "$QT_ROOT_DIR/lib/cmake/Qt6/android.toolchain.cmake"; do
            if [ -f "$TOOLCHAIN" ] && [ -z "$QT_NDK_VERSION" ]; then
              QT_NDK_VERSION=$(grep -oP 'ANDROID_NDK_REVISION\s+"?\K[0-9.]+' "$TOOLCHAIN" 2>/dev/null || true)
            fi
          done

          # Fallback to known-good version for Qt 6.11.x
          if [ -z "$QT_NDK_VERSION" ]; then
            QT_NDK_VERSION="27.1.12297006"
          fi

          echo "NDK version needed: $QT_NDK_VERSION"

          # Install if not already present
          if [ ! -d "$ANDROID_SDK_ROOT/ndk/$QT_NDK_VERSION" ]; then
            echo "Installing NDK $QT_NDK_VERSION..."
            yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;$QT_NDK_VERSION" || true
          else
            echo "NDK $QT_NDK_VERSION already installed"
          fi

          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/$QT_NDK_VERSION" >> $GITHUB_ENV

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: android-arm64
          # At 500M the cache sat at 99.8% full and evicted at save time
          # (a full build is ~600 objects ≈ one cache-full). 1G fits in the
          # repo cache budget now that prune-caches.yml keeps 1 copy/group.
          max-size: 1G

      # androiddeployqt's "Creating APK" step otherwise downloads the full
      # gradle distribution and re-resolves every dependency on each run
      # (~1m14s of the job). Stable key: an exact hit skips re-saving, so
      # this entry never accumulates timestamped copies. The Qt version
      # pins the gradle/AGP generation — bump the key with Qt upgrades.
      - name: Cache Gradle (androiddeployqt)
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-qt6.11.1-${{ hashFiles('android/build.gradle') }}
          restore-keys: |
            gradle-android-qt6.11.1-

      - name: Configure ccache for CI
        run: ccache --set-config=compiler_check=content

      - name: Wrap NDK compilers with ccache
        run: |
          # Qt's Android toolchain overrides CMAKE_*_COMPILER_LAUNCHER,
          # so we wrap the actual NDK compiler binaries with ccache instead.
          # We must wrap ALL clang variants: bare clang/clang++, versioned
          # clang-NN, and target-triple prefixed (aarch64-linux-androidNN-clang).
          NDK_BIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"

          # Find the real clang binary (resolve all symlinks)
          REAL_CLANG="$(readlink -f "$NDK_BIN/clang")"
          echo "Real clang: $REAL_CLANG"

          # Wrap every clang/clang++ variant in the NDK bin directory
          for COMP in "$NDK_BIN"/clang "$NDK_BIN"/clang++ "$NDK_BIN"/clang-[0-9]* "$NDK_BIN"/*-clang "$NDK_BIN"/*-clang++; do
            [ -e "$COMP" ] || continue
            # Skip the real binary itself
            RESOLVED="$(readlink -f "$COMP")"
            if [ "$RESOLVED" = "$REAL_CLANG" ] && [ "$(basename "$COMP")" = "$(basename "$REAL_CLANG")" ]; then
              echo "Skipping real binary: $COMP"
              continue
            fi

            # Determine if this is a C++ variant
            case "$(basename "$COMP")" in
              *clang++*|*c++*) DRIVER_FLAG="--driver-mode=g++ " ;;
              *) DRIVER_FLAG="" ;;
            esac

            rm -f "$COMP"
            printf '#!/bin/sh\nexec ccache "%s" %s"$@"\n' "$REAL_CLANG" "$DRIVER_FLAG" > "$COMP"
            chmod +x "$COMP"
            echo "Wrapped $(basename "$COMP") -> ccache $(basename "$REAL_CLANG") $DRIVER_FLAG"
          done

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/keystore.jks
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> $GITHUB_ENV

      - name: Override Qt Android platform plugin (a11y fixes, #1300)
        run: |
          # Patched qtforandroid plugin fixing QTBUG-118858 (TalkBack typing echo)
          # and QTBUG-145786 (keyboard-on-focus). See android/qt-overrides/README.md.
          # No-op until the .so is committed; ABI-locked to the Qt version above —
          # rebuild or remove on any Qt bump.
          OVERRIDE="android/qt-overrides/arm64-v8a/libplugins_platforms_qtforandroid_arm64-v8a.so"
          DEST="$QT_ROOT_DIR/plugins/platforms/libplugins_platforms_qtforandroid_arm64-v8a.so"
          if [ -f "$OVERRIDE" ]; then
            if [ ! -f "$DEST" ]; then
              echo "::error::Stock plugin not found at $DEST — Qt layout changed; refusing to ship unverified override."
              exit 1
            fi
            echo "Replacing stock Android platform plugin with patched a11y build:"
            ls -l "$OVERRIDE" "$DEST"
            cp -f "$OVERRIDE" "$DEST"
            echo "Override applied."
          else
            echo "No a11y plugin override present — using stock Qt platform plugin."
          fi

          # The accessibility Java classes (QtAccessibilityDelegate /
          # QtAccessibilityInterface / QtNativeAccessibility) live in Qt6Android.jar,
          # NOT the .so. The typing-echo path needs both halves, so override the jar
          # too (stock jar with only the patched a11y classes swapped in).
          JAR_OVERRIDE="android/qt-overrides/Qt6Android.jar"
          JAR_DEST="$QT_ROOT_DIR/jar/Qt6Android.jar"
          if [ -f "$JAR_OVERRIDE" ]; then
            if [ ! -f "$JAR_DEST" ]; then
              echo "::error::Stock Qt6Android.jar not found at $JAR_DEST — Qt layout changed; refusing to ship unverified override."
              exit 1
            fi
            echo "Replacing stock Qt6Android.jar with patched a11y build:"
            ls -l "$JAR_OVERRIDE" "$JAR_DEST"
            cp -f "$JAR_OVERRIDE" "$JAR_DEST"
            echo "Jar override applied."
          else
            echo "No a11y jar override present — using stock Qt6Android.jar."
          fi

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          $QT_ROOT_DIR/bin/qt-cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build
        env:
          QT_ANDROID_KEYSTORE_STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
        run: |
          cd build
          cmake --build . --config Release --parallel $(nproc)

      - name: Find APK
        id: apk
        run: |
          VERSION=${{ steps.version.outputs.version }}

          echo "=== All APK files ==="
          find build -name "*.apk" -type f 2>/dev/null || true

          echo "=== All AAB files ==="
          find build -name "*.aab" -type f 2>/dev/null || true

          # Look for versioned APK first (from build.gradle hook)
          APK_PATH=$(find build -name "Decenza_${VERSION}.apk" -type f 2>/dev/null | head -1)

          # Fallback: signed APK
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find build -name "*-release-signed.apk" -type f 2>/dev/null | head -1)
          fi

          # Last resort: unsigned APK
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find build -name "*-release-unsigned.apk" -type f 2>/dev/null | head -1)
          fi

          echo "Found APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Sign APK if unsigned
        id: signed_apk
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          APK="${{ steps.apk.outputs.apk_path }}"
          VERSION=${{ steps.version.outputs.version }}

          if [ -z "$APK" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi

          if echo "$APK" | grep -q "unsigned"; then
            echo "APK is unsigned, signing manually..."
            APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name "apksigner" -not -name "*.bat" -type f | sort -V | tail -1)

            if [ -n "$APKSIGNER" ]; then
              SIGNED_APK="$(dirname $APK)/Decenza_${VERSION}.apk"
              $APKSIGNER sign \
                --ks "$ANDROID_KEYSTORE_PATH" \
                --ks-key-alias "de1-key" \
                --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
                --out "$SIGNED_APK" \
                "$APK"
              echo "Signed APK: $SIGNED_APK"
              echo "apk_path=$SIGNED_APK" >> $GITHUB_OUTPUT
            else
              echo "ERROR: apksigner not found!"
              exit 1
            fi
          else
            echo "APK is already signed"
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v7
        with:
          name: Decenza-Android-arm64
          path: ${{ steps.signed_apk.outputs.apk_path || steps.apk.outputs.apk_path }}
          retention-days: 1
          overwrite: true

      - name: Upload to GitHub Release
        if: ${{ inputs.upload_to_release == true || startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          APK="${{ steps.signed_apk.outputs.apk_path }}"
          if [ -z "$APK" ]; then
            APK="${{ steps.apk.outputs.apk_path }}"
          fi

          # Find the release tag
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${VERSION}"
          fi

          echo "Uploading to release: $TAG"

          # Check if release exists, create if not
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --title "Decenza $TAG" \
              --generate-notes
          fi

          # Upload APK
          if [ -n "$APK" ] && [ -f "$APK" ]; then
            gh release upload "$TAG" "$APK" --clobber
          fi

      - name: Inject build number into release notes
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          BUILD_CODE="${{ steps.bump.outputs.build_code }}"

          # Get current release notes
          CURRENT_NOTES=$(gh release view "$TAG" --json body --jq '.body' 2>/dev/null || echo "")

          # Update existing Build: line, or inject one if not present
          if echo "$CURRENT_NOTES" | grep -qE "^Build:? [0-9]+"; then
            # Replace existing Build: line with new build number
            NEW_NOTES=$(echo "$CURRENT_NOTES" | sed -E "s/^Build:? [0-9]+/Build: $BUILD_CODE/")
            gh release edit "$TAG" --notes "$NEW_NOTES"
            echo "Updated Build: $BUILD_CODE in release notes"
          elif [ -z "$CURRENT_NOTES" ]; then
            gh release edit "$TAG" --notes "Build: $BUILD_CODE"
            echo "Injected Build: $BUILD_CODE into release notes"
          else
            # Insert Build: line after first heading or at the top
            NEW_NOTES=$(echo "$CURRENT_NOTES" | sed "0,/^## /{s/^## \(.*\)/## \1\n\nBuild: $BUILD_CODE/}")
            # If no heading was found (sed didn't change anything), prepend
            if [ "$NEW_NOTES" = "$CURRENT_NOTES" ]; then
              NEW_NOTES="Build: $BUILD_CODE

          $CURRENT_NOTES"
            fi
            gh release edit "$TAG" --notes "$NEW_NOTES"
            echo "Injected Build: $BUILD_CODE into release notes"
          fi

      - name: Commit version code back to main
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          BUILD_CODE="${{ steps.bump.outputs.build_code }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          # Preserve .ccache before stash (stash --include-untracked would wipe it)
          [ -d .ccache ] && mv .ccache /tmp/.ccache-preserve
          git stash --include-untracked
          git checkout origin/main
          [ -d /tmp/.ccache-preserve ] && mv /tmp/.ccache-preserve .ccache
          echo "$BUILD_CODE" > versioncode.txt
          git add versioncode.txt
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No version code changes to commit"
          else
            git commit -m "ci: bump version code to $BUILD_CODE [skip ci]"
            # Retry push with rebase in case main advanced during the build
            PUSH_OK=false
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                echo "Committed version code $BUILD_CODE back to main"
                PUSH_OK=true
                break
              else
                echo "Push failed (attempt $attempt/3), rebasing..."
                git pull --rebase origin main
              fi
            done
            if [ "$PUSH_OK" != "true" ]; then
              echo "::warning::Could not push version code $BUILD_CODE back to main after 3 attempts"
            fi
          fi

      - name: Cleanup keystore
        if: always()
        run: |
          rm -f $RUNNER_TEMP/keystore.jks || true
