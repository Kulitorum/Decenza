name: Nightly sanitizers

# Runs the test suite under AddressSanitizer and UndefinedBehaviorSanitizer once
# a night on main, as two independent builds.
#
# Why nightly and not per-pull-request. A pre-merge version of this existed
# briefly and was removed. The evidence for removing it is worth keeping: three
# detectors (UBSan, ASan, -Wall -Wextra) were run for the first time over eight
# months of previously unexamined code — the moment when a new tool's harvest
# should be at its largest — and they found no pre-existing runtime defects at
# all. The only two failures the PR job ever produced were problems it created
# itself (a vptr typeinfo link break from enabling UBSan, and a clang-only flag
# that GCC rejected). A near-empty first harvest is evidence the codebase is
# clean on these axes, which makes the expected future yield low as well, and a
# low-yield detector does not earn a place on the critical path of every push.
#
# It still earns a nightly slot: cost here is idle CI time nobody waits on, and
# a regression gets caught within a day instead of at a release tag.
#
# What this does NOT cover, so nobody reads a green night as more than it is:
#   - One platform (Linux x64). #1558, the build break that motivated all of
#     this, was inside #ifdef Q_OS_IOS and would not be caught here.
#   - Only code the test suite executes. Coverage is unmeasured.
#   - Data races. ThreadSanitizer is unusable against an uninstrumented Qt —
#     measured at 10,194 reports, 94% of them false positives from Qt's own
#     queued-connection machinery. See docs/CLAUDE_MD/TESTING.md.
#
# Compiler diagnostics are deliberately NOT here. -Wall -Wextra -Werror runs in
# every build, on every developer's machine, which is where a warning should be
# found — not in a log read once a day.
#
# Expect the first ASan runs to surface leaks at exit; LeakSanitizer is on by
# default on Linux and Qt/QML exit paths are noisy. Those are findings to fix or
# file, never to silence for a green night.

on:
  schedule:
    # 04:23 UTC — offset from prune-caches.yml's 03:17 cron so the prune has
    # settled before this writes new cache generations.
    - cron: '23 4 * * *'
  workflow_dispatch:
    inputs:
      use_cache:
        description: 'Use the compiler cache (auto-yields when cache space is tight)'
        required: false
        default: true
        type: boolean

# The sanitizer cache is the FIRST thing that should go when the cache store
# fills. Nobody waits on this job, so its cache is pure convenience, while the
# release and Qt caches it would evict are on paths people do wait on.
#
# Below this much free space, the job yields: it builds cold AND deletes its own
# cache entries, handing the space back rather than merely declining to grow.
# Disabling without reclaiming would leave ~1.2 GB parked while pretending to
# have helped.
env:
  CACHE_HEADROOM_MIN_GB: '2'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  sanitize:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    strategy:
      # Independent builds: ASan and UBSan objects never hash-match, so they
      # cannot share a ccache. fail-fast off because a finding from one
      # sanitizer says nothing about the other, and cancelling the survivor
      # would throw away the half of the night's signal that still works.
      fail-fast: false
      matrix:
        include:
          - sanitizer: ubsan
            cmake_flag: -DENABLE_UBSAN=ON
          - sanitizer: asan
            cmake_flag: -DENABLE_ASAN=ON

    name: ${{ matrix.sanitizer }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libpulse0 \
            libspeechd2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtquick3d qtshadertools qtgraphs qtconnectivity qtmultimedia qtpositioning qtspeech qtwebsockets qtserialport qtimageformats qtcanvaspainter'
          cache: true
          cache-key-prefix: 'qt-linux-v4'

      # ccache, one entry per sanitizer. ASan and UBSan objects never
      # hash-match, so they cannot share one; hence the matrix value in the key.
      #
      # This job originally ran WITHOUT a cache, reasoning that nobody waits on
      # a nightly and the repo sat near GitHub's 10 GB cap, where two sanitizer
      # caches would evict the entries keeping release builds warm. The premise
      # was right and the conclusion was wrong: the cap pressure was not from
      # live caches at all. Half the store — 5.0 GB — belonged to a deleted
      # branch and a merged PR. See the dead-ref step in prune-caches.yml,
      # which now reclaims that automatically.
      #
      # With the space back, the trade no longer holds: a cold build costs ~24
      # minutes to run a 36-second suite (measured 2026-07-19, build 23m50s of
      # a 25m45s job).
      - name: Yield the compiler cache when space is tight
        id: cachefit
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL: ${{ github.event_name == 'workflow_dispatch' && inputs.use_cache || true }}
          MINE: sanitizers-${{ matrix.sanitizer }}-linux-x86_64
        run: |
          set -uo pipefail
          if [ "$MANUAL" != "true" ]; then
            echo "use_cache=false" >> "$GITHUB_OUTPUT"
            echo "Compiler cache disabled by workflow input." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Sum the cache LIST, not the usage endpoint. The usage endpoint lags:
          # observed reporting 8.57 GB / 19 entries immediately after a deletion
          # the list already showed as complete at 5.1 GB / 9 entries. Deciding
          # on a stale total would keep caching exactly when space ran out.
          USED=$(gh cache list --repo "$GITHUB_REPOSITORY" --limit 500 \
                   --json sizeInBytes --jq '[.[].sizeInBytes] | add // 0' 2>/dev/null || echo "")
          if [ -z "$USED" ]; then
            # Never fail the sanitizer run over a cache decision.
            echo "use_cache=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not read cache usage; proceeding with the cache."
            exit 0
          fi

          CAP=$((10 * 1024 * 1024 * 1024))
          FREE=$(( CAP - USED ))
          MIN=$(( CACHE_HEADROOM_MIN_GB * 1024 * 1024 * 1024 ))
          FREE_GB=$(awk "BEGIN{printf \"%.2f\", $FREE/1073741824}")

          if [ "$FREE" -ge "$MIN" ]; then
            echo "use_cache=true" >> "$GITHUB_OUTPUT"
            echo "Compiler cache in use (${FREE_GB} GB free, need ${CACHE_HEADROOM_MIN_GB} GB)." \
              >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Yield: build cold, and hand back what this leg is holding.
          echo "use_cache=false" >> "$GITHUB_OUTPUT"
          {
            echo "### Compiler cache yielded"
            echo ""
            echo "Only **${FREE_GB} GB** free (threshold ${CACHE_HEADROOM_MIN_GB} GB)."
            echo "Building cold and releasing this leg's cache entries."
          } >> "$GITHUB_STEP_SUMMARY"

          # Only this leg's own entries — the other sanitizer leg manages its
          # own, so the two matrix jobs cannot race on the same ids.
          gh cache list --repo "$GITHUB_REPOSITORY" --limit 500 --json id,key,sizeInBytes \
            | jq -r --arg mine "$MINE" \
                '.[] | select(.key | startswith($mine)) | "\(.id)\t\(.sizeInBytes)\t\(.key)"' \
            | while IFS=$'\t' read -r id size key; do
                [ -n "$id" ] || continue
                if gh cache delete "$id" --repo "$GITHUB_REPOSITORY"; then
                  echo "- released \`$key\` ($(( size / 1024 / 1024 )) MB)" >> "$GITHUB_STEP_SUMMARY"
                fi
              done

      - name: Set up ccache
        uses: ./.github/actions/setup-compiler-cache
        with:
          key: sanitizers-${{ matrix.sanitizer }}-linux-x86_64
          use_cache: ${{ steps.cachefit.outputs.use_cache }}
          max-size: 600M

      # Hash on file CONTENT rather than mtime, so a fresh checkout (every run
      # here) still hits. Mirrors linux-release.yml.
      - name: Configure ccache for CI
        run: ccache --set-config=compiler_check=content

      - name: Configure CMake
        env:
          SANITIZER_FLAG: ${{ matrix.cmake_flag }}
        run: |
          mkdir -p build
          cd build
          $QT_ROOT_DIR/bin/qt-cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_TESTS=ON \
            "$SANITIZER_FLAG"

      # `build_tests`, not `all`. This job runs the ctest suite and nothing
      # else, and `all` is dominated by targets it never executes: the Decenza
      # app (385 C++ objects) and the tools (36) against the tests' 318.
      # Measured with `ninja -t commands`: 1238 build steps for `all` vs 524
      # for `build_tests` — 57.7% fewer, plus the app's link.
      #
      # No coverage is lost. Sanitizers report on code that RUNS, and nothing
      # here runs the app; the src/ sources the tests exercise are compiled into
      # decenza_testlib/decenza_shotlib and are still instrumented. App-only
      # code (main.cpp, QML glue) is compiled several times a day by the
      # platform builds anyway.
      - name: Build
        run: |
          cd build
          ninja -j$(nproc) build_tests

      # Both option sets are exported unconditionally; each sanitizer reads only
      # its own variable, so the inactive one is inert. halt_on_error matters:
      # UBSan's default is report-and-continue, so without it a run can print
      # undefined behaviour and still exit 0. (-fno-sanitize-recover=all in
      # CMakeLists.txt already forces this; the variable is belt-and-braces.)
      # Prove the compiler cache was actually WIRED UP, not merely installed.
      #
      # This exists because it silently was not. The ccache step was added, went
      # green, and cached nothing for three runs: the action installs ccache and
      # restores/saves its directory, but CMake only routes compilation through
      # it when CMAKE_{C,CXX}_COMPILER_LAUNCHER is set — and that was missing
      # here while linux-release.yml had it. The only visible symptom was a line
      # nobody reads: "Cache size (GB): 0.0 / 0.6 (0.00%)". Build times were
      # unchanged and every step reported success.
      #
      # A cache that caches nothing is the same shape as a sanitizer that is not
      # applied, which is why this job carries canaries. Same remedy: make the
      # mechanism assert its own effect.
      #
      # The assertion is on CMakeCache.txt rather than on `ccache -s` output,
      # deliberately: it tests the exact thing that was missing, and does not
      # depend on the stats format of whichever ccache version the runner has.
      - name: Verify the compiler cache is wired in
        run: |
          set -uo pipefail
          if ! grep -qE "^CMAKE_CXX_COMPILER_LAUNCHER:.*ccache" build/CMakeCache.txt; then
            echo "::error::CMAKE_CXX_COMPILER_LAUNCHER is not set to ccache — the cache is inert and every build is cold."
            exit 1
          fi
          echo "Compiler launcher wired: $(grep -E '^CMAKE_CXX_COMPILER_LAUNCHER:' build/CMakeCache.txt)"
          {
            echo "### Compiler cache"
            echo '```'
            ccache -s || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run tests under sanitizer
        env:
          QT_QPA_PLATFORM: offscreen
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          ASAN_OPTIONS: print_stacktrace=1:detect_leaks=1
        run: |
          cd build
          set -o pipefail
          # --repeat until-pass:3 absorbs the rare timing flake in the two
          # clock-cadence tests (tst_settling, tst_decentscalewifi) under CPU
          # contention. A real failure still fails all 3 attempts.
          ctest --output-on-failure -j$(nproc) --repeat until-pass:3 2>&1 | tee ctest.log

      - name: Summarise
        if: always()
        env:
          SANITIZER: ${{ matrix.sanitizer }}
        run: |
          LOG=build/ctest.log
          # Set when a sanitizer report is present in the log, regardless of
          # ctest's exit code — see the exit at the end of this step.
          FOUND=0
          {
            echo "## Nightly $SANITIZER"
            if [ ! -f "$LOG" ]; then
              echo "Failed before the test step (configure or build)."
            elif grep -qE "(sanitizer|asan)_canary.*(Failed|\*\*\*)" "$LOG"; then
              echo "**Canary failed — instrumentation is not in effect.** Every other"
              echo "result in this run is worth less than it looks, including the passes."
            elif grep -qE "ERROR: (Address|Leak)Sanitizer|SUMMARY: UndefinedBehaviorSanitizer" "$LOG"; then
              FOUND=1
              echo "**Sanitizer finding(s):**"
              echo '```'
              grep -E "ERROR: (Address|Leak)Sanitizer.*|runtime error:.*|SUMMARY: UndefinedBehaviorSanitizer.*" "$LOG" | sort -u | head -40
              echo '```'
            else
              echo "No sanitizer findings."
            fi
            grep -E "^[0-9]+% tests passed" "$LOG" 2>/dev/null || true
          } >> "$GITHUB_STEP_SUMMARY"

          # Fail the job on a finding even when ctest exited 0.
          #
          # --repeat until-pass:3 exists for the two clock-cadence tests, but it
          # applies to the whole suite: an intermittent use-after-free or
          # data-dependent UB that reproduces on 1 of 3 attempts passes on retry
          # and ctest exits 0 — while this very summary prints the report from
          # the failed attempt. A green tick over a summary reading "Sanitizer
          # finding(s)" is the worst of both, and nightlies are read by the tick.
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Sanitizer finding present in the log; failing the job even though ctest may have passed on retry."
            exit 1
          fi
